version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: root@admin.com
      PGADMIN_DEFAULT_PASSWORD: root@123
      #PGADMIN_DEFAULT_EMAIL: [EMAIL_ADDRESS]
      #PGADMIN_DEFAULT_PASSWORD: [PASSWORD]
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - fastapi_pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8081:80"
      - "8080:8080" # Traefik Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8082:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/app_db
      - SECRET_KEY=changethis_secret_key_for_dev_only
    volumes:
      - ./services/auth-service:/app/services/auth-service
      - ./packages/shared:/app/packages/shared
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/v1/auth`)"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"
    depends_on:
      db:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8083:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/app_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=changethis_secret_key_for_dev_only
    volumes:
      - ./services/notification-service:/app/services/notification-service
      - ./packages/shared:/app/packages/shared
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jobs.rule=PathPrefix(`/api/v1/jobs`)"
      - "traefik.http.services.jobs.loadbalancer.server.port=8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-worker:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    command: celery -A src.infrastructure.celery.celery_app worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=changethis_secret_key_for_dev_only
    volumes:
      - ./services/notification-service:/app/services/notification-service
      - ./packages/shared:/app/packages/shared
    depends_on:
      redis:
        condition: service_healthy

  notification-beat:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    command: celery -A src.infrastructure.celery.celery_app beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=changethis_secret_key_for_dev_only
    volumes:
      - ./services/notification-service:/app/services/notification-service
      - ./packages/shared:/app/packages/shared
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  fastapi_pgadmin_data: